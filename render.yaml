services:
  - type: web
    name: knightbot-md
    env: docker
    plan: free
    envVars:
      - key: OWNER_NUMBER
        sync: false
      - key: SESSION_ID
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 18.20.2
      - key: TZ
        value: Asia/Jakarta
