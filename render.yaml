services:
  - type: web
    name: knightbot-md
    env: docker
    plan: free
    envVars:
      - key: OWNER_NUMBER
        sync: false
      - key: SESSION_ID
        sync: false
      - key: PORT
        value: 3000
      - key: TZ
        value: UTC
      - key: NODE_OPTIONS
        value: "--max-old-space-size=450 --optimize-for-size --gc-interval=100"
